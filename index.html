        // Führe die App-Logik SOFORT aus (nicht erst beim Onload)
        try {
            // BEHOBEN: 'sv' (Schwedisch) erzwingt das Format YYYY-MM-DD in der LOKALEN Zeitzone des Users
            const heute = new Date().toLocaleDateString('sv'); 
            
            let letzterBesuch = localStorage.getItem('letzterBesuch');
            let streak = parseInt(localStorage.getItem('streak')) || 0;
            let wortIndex = parseInt(localStorage.getItem('wortIndex')) || 0;

            if (letzterBesuch !== heute) {
                if (letzterBesuch) {
                    const gestern = new Date();
                    gestern.setDate(gestern.getDate() - 1);
                    // BEHOBEN: Gestern ebenfalls in lokaler Zeitzone formatieren
                    const gesternText = gestern.toLocaleDateString('sv');

                    if (letzterBesuch === gesternText) {
                        streak++; 
                    } else {
                        streak = 1; 
                    }
                    wortIndex++;
                } else {
                    streak = 1;
                    wortIndex = 0;
                }
                
                localStorage.setItem('letzterBesuch', heute);
                localStorage.setItem('streak', streak);
                localStorage.setItem('wortIndex', wortIndex);
            }

            if (wortIndex >= woerterDatenbank.length) {
                wortIndex = wortIndex % woerterDatenbank.length;
            }

            // Design für das Wort zurücksetzen (da JavaScript läuft!)
            const wortAnzeige = document.getElementById('wort-anzeige');
            wortAnzeige.style.fontSize = "38px";
            wortAnzeige.style.color = "#1a252f";

            document.getElementById('streak-anzeige').innerText = "🔥 " + streak + " Tag(e)";

            const heutigesWort = woerterDatenbank[wortIndex];

            document.getElementById('definition-anzeige').innerText = heutigesWort.definition;
            document.getElementById('herkunft-anzeige').innerText = heutigesWort.herkunft;
            document.getElementById('anwendung-anzeige').innerText = "„" + heutigesWort.anwendung + "“";

        } catch (error) {
            // OPTIMIERUNG: Falls localStorage blockiert wird, berechnen wir den Index anhand der 
            // vergangenen Tage auf der Erde. So wechselt das Wort AUCH auf iPhones ohne Speicher täglich!
            const tageSeit1970 = Math.floor(Date.now() / (1000 * 60 * 60 * 24));
            const fallBackIndex = tageSeit1970 % woerterDatenbank.length;

            const wortAnzeige = document.getElementById('wort-anzeige');
            wortAnzeige.style.fontSize = "38px";
            wortAnzeige.style.color = "#1a252f";

            const heutigesWort = woerterDatenbank[fallBackIndex];
            wortAnzeige.innerText = heutigesWort.wort;
            document.getElementById('definition-anzeige').innerText = heutigesWort.definition;
            document.getElementById('herkunft-anzeige').innerText = heutigesWort.herkunft;
            document.getElementById('anwendung-anzeige').innerText = "„" + heutigesWort.anwendung + "“";
            document.getElementById('streak-anzeige').innerText = "🔥 --";
        }
