    <style>

            margin: 0;
            padding: 20px;

        }

            border: 1px solid #eae5d9;

            position: relative;
        }

        .hidden {

        }

        .streak-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffeeda;
            color: #d35400;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 13px;
            font-family: 'Segoe UI', system-ui, sans-serif;

            color: #a89f91;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
            margin-top: 10px;
            font-weight: 600;
        }

        .word {
            font-size: 36px;
            font-weight: bold;
            color: #1a252f;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .section {
            text-align: left;
            background: #f5f2eb;
            padding: 18px 22px;
            border-radius: 8px;
            margin-bottom: 18px;
            border-left: 4px solid #e67e22;
        }

        .section h3 {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin-top: 0;
            font-size: 12px;
            color: #b87333;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .section p {
            margin: 0;
            font-size: 16px;
            color: #2c3e50;
            line-height: 1.6;
        }

        .example {
            font-style: italic;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 20px;
            margin: 20px 0;
            box-sizing: border-box;
            border: 1px solid #d1cbbd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background-color: #faf8f5;
            font-family: system-ui, sans-serif;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            border-color: #e67e22;
        }

        button {
            background-color: #e67e22;
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #d35400;
        }

        .error-message {
            color: #b22222;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            font-family: system-ui, sans-serif;
        }
    </style>
</head>

        // Passwort-Schutz (Handysicher für GitHub!)
        function pruefePasswort() {
            const eingabe = document.getElementById('passwort-feld').value.trim().toLowerCase();
            const fehlerAnzeige = document.getElementById('fehler-anzeige');

            if (eingabe === "peerswoerter") {
                try {
                    localStorage.setItem('passwortKorrekt', 'true');
                } catch (e) {
                    console.warn("Speichern des Login-Status nicht möglich.");
                }
                starteApp();
            } else {
                fehlerAnzeige.innerText = "Falscher Generalschlüssel! Bitte versuche es erneut.";
                document.getElementById('passwort-feld').value = "";
            }
        }

        function starteApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            appLogikAusfuehren();
        }

        function appLogikAusfuehren() {
            try {
                const heute = new Date().toISOString().split('T')[0]; 
                
                let letzterBesuch = localStorage.getItem('letzterBesuch');
                let streak = parseInt(localStorage.getItem('streak')) || 0;
                let wortIndex = parseInt(localStorage.getItem('wortIndex')) || 0;

                if (letzterBesuch !== heute) {
                    if (letzterBesuch) {
                        const gestern = new Date();
                        gestern.setDate(gestern.getDate() - 1);
                        const gesternText = gestern.toISOString().split('T')[0];

                        if (letzterBesuch === gesternText) {
                            streak++; 
                        } else {
                            streak = 1; 
                        }
                        wortIndex++;
                    } else {
                        streak = 1;
                        wortIndex = 0;
                    }
                    
                    localStorage.setItem('letzterBesuch', heute);
                    localStorage.setItem('streak', streak);
                    localStorage.setItem('wortIndex', wortIndex);
                }

                if (wortIndex >= woerterDatenbank.length) {
                    wortIndex = wortIndex % woerterDatenbank.length;
                }

                document.getElementById('streak-anzeige').innerText = "🔥 " + streak + " Tag(e)";

                const heutigesWort = woerterDatenbank[wortIndex];
                document.getElementById('wort-anzeige').innerText = heutigesWort.wort;
                document.getElementById('definition-anzeige').innerText = heutigesWort.definition;
                document.getElementById('herkunft-anzeige').innerText = heutigesWort.herkunft;
                document.getElementById('anwendung-anzeige').innerText = "„" + heutigesWort.anwendung + "“";

            } catch (error) {
                const heutigesWort = woerterDatenbank[0];
                document.getElementById('wort-anzeige').innerText = heutigesWort.wort;
                document.getElementById('definition-anzeige').innerText = heutigesWort.definition;
                document.getElementById('herkunft-anzeige').innerText = heutigesWort.herkunft;
                document.getElementById('anwendung-anzeige').innerText = "„" + heutigesWort.anwendung + "“";
                document.getElementById('streak-anzeige').innerText = "🔥 --";
            }
        }

        window.onload = function() {
            try {
                const istEingeloggt = localStorage.getItem('passwortKorrekt');
                if (istEingeloggt === 'true') {
                    starteApp();
                }
            } catch (e) {
                console.warn("Automatischer Login nicht möglich.");
            }
            
            document.getElementById('passwort-feld').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    pruefePasswort();
                }
            });
        };
    </script>
